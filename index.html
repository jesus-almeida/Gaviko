<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"
    />

    <!-- ========== EVITAR FOUC: aplicar tema oscuro de inmediato ========== -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
      })();
    </script>

    <!-- ========== PWA ========== -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#f9a8d4" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Gaviko" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- iOS Splash Screen (Vertical) -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="splash_screens/iPhone_8_Plus__iPhone_7_Plus__iPhone_6s_Plus__iPhone_6_Plus_portrait.png"
    />
    <!-- iOS Splash Screen (Horizontal) -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
      href="splash_screens/iPhone_8_Plus__iPhone_7_Plus__iPhone_6s_Plus__iPhone_6_Plus_landscape.png"
    />

    <!-- Iconos -->
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="./icons/favicon-96x96.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./icons/apple-touch-icon.png"
    />
    <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg" />

    <!-- ========== CSS BASE ========== -->
    <link rel="stylesheet" href="./css/base/variables.css" />
    <link rel="stylesheet" href="./css/base/reset.css" />
    <link rel="stylesheet" href="./css/base/typography.css" />
    <link rel="stylesheet" href="./css/base/utilities.css" />
    <!-- ========== CSS COMPONETS ========== -->
    <link rel="stylesheet" href="./css/components/navbar.css" />
    <link rel="stylesheet" href="./css/components/cards.css" />
    <!-- ========== CSS PAGES ========== -->
    <link rel="stylesheet" href="./css/pages/home.css" />
    <link rel="stylesheet" href="./css/pages/calculator.css" />
    <link rel="stylesheet" href="./css/pages/pasajes.css" />
    <link rel="stylesheet" href="./css/pages/rates.css" />
    <link rel="stylesheet" href="./css/pages/settings.css" />
    <!-- ========== CSS LAYOUTS ========== -->
    <link rel="stylesheet" href="./css/layouts/main.css" />

    <!-- ========== FONT AWESOME (iconos) ========== -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <title>Gaviko</title>
  </head>
  <body>
    <!-- Contenedor principal de la app (simula un móvil en desktop) -->
    <div class="app-container max-w-app mx-auto">
      <!-- Contenido dinámico gestionado por el router -->
      <main class="main-content" id="mainContent">
        <!-- Aquí se renderizarán las vistas (Inicio, Calculadora, etc.) -->
      </main>

      <!-- Barra de navegación inferior fija -->
      <nav class="bottom-nav">
        <button class="nav-item" data-nav="calculadora">
          <i class="fas fa-calculator"></i>
          <span>Calculadora</span>
        </button>
        <button class="nav-item" data-nav="pasajes">
          <i class="fas fa-bus"></i>
          <span>Pasajes</span>
        </button>
        <button class="nav-item" data-nav="inicio">
          <i class="fas fa-home"></i>
          <span>Inicio</span>
        </button>
        <button class="nav-item" data-nav="tasa">
          <i class="fas fa-dollar-sign"></i>
          <span>Tasas</span>
        </button>
        <button class="nav-item" data-nav="ajustes">
          <i class="fas fa-cog"></i>
          <span>Ajustes</span>
        </button>
      </nav>
    </div>

    <!-- Script principal (módulo ES6, se expandirá en futuros pasos) -->
    <script src="./js/core/app.js" type="module"></script>
  </body>
</html>
